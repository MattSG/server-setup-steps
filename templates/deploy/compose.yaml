services:
  caddy:
    image: caddy:2.10-alpine
    restart: unless-stopped
    env_file:
      - ./proxy.env
    network_mode: host
    volumes:
      - ./caddy:/etc/caddy:ro
      - ./state:/srv/state
      - caddy_data:/data
      - caddy_config:/config

  app:
    image: ${APP_IMAGE}
    restart: unless-stopped
    env_file:
      - ./app.env
    ports:
      - "127.0.0.1:3000:8080"

  api:
    image: ${API_IMAGE}
    restart: unless-stopped
    env_file:
      - ./api.env
    ports:
      - "127.0.0.1:8080:8080"

volumes:
  caddy_data:
  caddy_config:

networks:
  default:
    enable_ipv6: true
